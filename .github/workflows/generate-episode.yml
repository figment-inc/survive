name: Generate & Publish Episode

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      AWS_ACCESS_KEY_ID_BEDROCK: ${{ secrets.AWS_ACCESS_KEY_ID_BEDROCK }}
      AWS_SECRET_ACCESS_KEY_BEDROCK: ${{ secrets.AWS_SECRET_ACCESS_KEY_BEDROCK }}
      AWS_BEDROCK_REGION: ${{ secrets.AWS_BEDROCK_REGION }}
      NANOBANANA_API_KEY: ${{ secrets.NANOBANANA_API_KEY }}
      NANOBANANA_MODEL: ${{ secrets.NANOBANANA_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
      METRICOOL_PUBLISH_ENABLED: ${{ secrets.METRICOOL_PUBLISH_ENABLED }}
      METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
      METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
      METRICOOL_TARGET_PLATFORMS: ${{ secrets.METRICOOL_TARGET_PLATFORMS }}
      METRICOOL_REQUIRED_NETWORKS: ${{ secrets.METRICOOL_REQUIRED_NETWORKS }}
      METRICOOL_SCHEDULE_TIMEZONE: ${{ secrets.METRICOOL_SCHEDULE_TIMEZONE }}
      PUBLISH_ENABLED: ${{ secrets.PUBLISH_ENABLED }}
      PUBLISH_PLATFORMS: ${{ secrets.PUBLISH_PLATFORMS }}
      PUBLISH_ENFORCE_COMPLIANCE: ${{ secrets.PUBLISH_ENFORCE_COMPLIANCE }}
      REQUEST_TIMEOUT_SECONDS: ${{ secrets.REQUEST_TIMEOUT_SECONDS }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core fonts-liberation
          pip install -r requirements.txt
          ffmpeg -version | head -1

      - name: Run pipeline
        run: python -u n8n/run_pipeline.py --publish

      - name: Commit and push episode files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-publish: new episode $(date -u +%Y-%m-%d_%H:%M)"
          git push
